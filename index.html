<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5-Koele Kindjes Klub Messaging</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0f0f12; --bg2:#16161c; --bg3:#1e1e28; --bg4:#252533;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#e8e8f0; --text2:#8888a0; --text3:#555568;
  --accent:#7c6aff; --accent2:#9d8fff; --accent-glow:rgba(124,106,255,0.18);
  --green:#34d399; --red:#f87171;
  --sidebar-w:260px;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;}

/* ── Auth ───────────────────────────────────────────────────────────────────── */
#auth-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(124,106,255,.12) 0%,transparent 70%);}
.auth-card{width:100%;max-width:400px;padding:40px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;}
.auth-logo{font-size:28px;font-weight:600;letter-spacing:-.5px;margin-bottom:6px;color:var(--accent2);}
.auth-logo span{color:var(--text2);font-weight:300;}
.auth-subtitle{font-size:13px;color:var(--text3);margin-bottom:32px;}
.auth-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:7px;padding:4px;margin-bottom:28px;}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:13px;font-weight:500;border-radius:5px;cursor:pointer;transition:all .2s;}
.auth-tab.active{background:var(--accent);color:#fff;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;letter-spacing:.3px;}
.form-input{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text3);}
.btn-primary{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px;}
.btn-primary:hover{opacity:.9;}
.btn-primary:active{transform:scale(.99);}
.auth-error{margin-top:14px;padding:10px 12px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:7px;font-size:12px;color:var(--red);display:none;}

/* ── App shell ──────────────────────────────────────────────────────────────── */
#app{display:none;height:100vh;overflow:hidden;}
#app.visible{display:flex;}

/* ── Sidebar ────────────────────────────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .25s ease, opacity .25s ease;
}
.sidebar.collapsed{width:0;opacity:0;pointer-events:none;}

.sidebar-header{padding:14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sidebar-logo{font-size:15px;font-weight:600;color:var(--accent2);letter-spacing:-.3px;white-space:nowrap;}

.icon-btn{width:30px;height:30px;border:none;background:transparent;color:var(--text2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;font-size:15px;flex-shrink:0;}
.icon-btn:hover{background:var(--bg3);color:var(--text);}

/* sidebar section headers */
.sidebar-section{padding:12px 14px 5px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.add-btn{width:18px;height:18px;font-size:14px;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:background .15s,color .15s;}
.add-btn:hover{background:var(--bg3);color:var(--accent);}

/* channel + dm lists — channels now flex:1 so it fills remaining space */
.channel-list{overflow-y:auto;padding:4px 8px;}
.channel-list::-webkit-scrollbar{width:4px;}
.channel-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
#channel-list{flex:1;} /* channels take all leftover space */
#dm-list{flex-shrink:0;max-height:200px;}

.channel-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:1px;position:relative;}
.channel-item:hover{background:var(--bg3);}
.channel-item.active{background:var(--accent-glow);}
.channel-icon{width:28px;height:28px;border-radius:7px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.channel-item.active .channel-icon{background:var(--accent);}
.channel-name{font-size:13px;font-weight:500;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.channel-item.active .channel-name{color:var(--text);}

/* unread badge on sidebar items */
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;display:none;}
.channel-item.has-unread .unread-dot{display:block;}

.user-avatar{width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;overflow:hidden;}
.user-avatar img{width:100%;height:100%;object-fit:cover;}
.dm-status{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.dm-status.online{background:var(--green);}

.user-bar{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px;flex-shrink:0;}
.user-bar-info{flex:1;overflow:hidden;}
.user-bar-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-bar-status{font-size:11px;color:var(--green);}

/* ── Main ───────────────────────────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0;}

.chat-header{padding:13px 16px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.chat-header-icon{width:34px;height:34px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.chat-header-info{flex:1;min-width:0;}
.chat-header-name{font-size:15px;font-weight:600;}
.chat-header-meta{font-size:12px;color:var(--text2);margin-top:1px;}

/* toggle sidebar btn in header */
#btn-toggle-sidebar{margin-right:2px;}

.messages-container{flex:1;overflow-y:auto;padding:20px 20px 8px;display:flex;flex-direction:column;gap:2px;}
.messages-container::-webkit-scrollbar{width:4px;}
.messages-container::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px;}

.msg-row{display:flex;align-items:flex-start;gap:10px;padding:3px 0;}
.msg-row.own{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:9px;flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;overflow:hidden;margin-top:2px;}
.msg-avatar img{width:100%;height:100%;object-fit:cover;}
.msg-avatar.placeholder{opacity:0;pointer-events:none;}
.msg-content{max-width:66%;display:flex;flex-direction:column;gap:2px;}
.msg-row.own .msg-content{align-items:flex-end;}
.msg-header{display:flex;align-items:baseline;gap:7px;margin-bottom:3px;padding:0 2px;}
.msg-row.own .msg-header{flex-direction:row-reverse;}
.msg-name{font-size:12px;font-weight:600;color:var(--text2);}
.msg-time{font-size:11px;color:var(--text3);font-family:var(--mono);}
.msg-count{font-size:10px;font-weight:600;padding:1px 6px;background:var(--accent-glow);color:var(--accent2);border-radius:10px;border:1px solid rgba(124,106,255,0.25);}
.msg-bubble{padding:9px 13px;border-radius:12px;font-size:14px;line-height:1.5;word-break:break-word;background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.msg-row.own .msg-bubble{background:var(--accent);color:#fff;border-color:transparent;}
.msg-image{max-width:280px;max-height:280px;border-radius:10px;object-fit:cover;cursor:pointer;display:block;}
.date-sep{display:flex;align-items:center;gap:12px;padding:14px 0 8px;color:var(--text3);font-size:11px;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border);}

/* typing indicator */
.typing-indicator{padding:4px 20px;min-height:24px;font-size:12px;color:var(--text3);font-style:italic;display:flex;align-items:center;gap:6px;}
.typing-dots{display:none;gap:3px;align-items:center;}
.typing-dots.visible{display:flex;}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:bounce .9s infinite;}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}

.input-area{padding:10px 16px 14px;flex-shrink:0;}
.input-box{display:flex;align-items:flex-end;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:13px;padding:8px 8px 8px 14px;transition:border-color .2s;}
.input-box:focus-within{border-color:var(--accent);}
#msg-input{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--font);font-size:14px;outline:none;resize:none;max-height:120px;line-height:1.5;padding:4px 0;}
#msg-input::placeholder{color:var(--text3);}
.input-actions{display:flex;align-items:center;gap:4px;}
.send-btn{width:34px;height:34px;border:none;background:var(--accent);color:#fff;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:opacity .2s,transform .1s;}
.send-btn:hover{opacity:.85;}
.send-btn:active{transform:scale(.95);}
.attach-btn{width:34px;height:34px;border:none;background:transparent;color:var(--text2);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:background .15s,color .15s;}
.attach-btn:hover{background:var(--bg4);color:var(--accent);}
.attach-btn:disabled{opacity:.35;cursor:not-allowed;}

/* ── Modal ──────────────────────────────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-width:380px;}
.modal h3{font-size:16px;font-weight:600;margin-bottom:18px;}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.btn-cancel{flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;font-family:var(--font);font-size:13px;cursor:pointer;}
.btn-cancel:hover{background:var(--bg4);}
.btn-confirm{flex:1;padding:10px;background:var(--accent);border:none;color:#fff;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;}
.btn-confirm:hover{opacity:.85;}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed;}

/* ── Misc ───────────────────────────────────────────────────────────────────── */
.upload-bar{display:none;height:3px;background:var(--bg4);border-radius:2px;margin-bottom:8px;overflow:hidden;}
.upload-bar.active{display:block;}
.upload-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;width:0%;}
.no-chat{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text3);}
.no-chat .big-icon{font-size:48px;}
.no-chat h3{font-size:18px;font-weight:600;color:var(--text2);}
.no-chat p{font-size:13px;}

/* toast notifications */
#toast-container{position:fixed;top:16px;right:16px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;min-width:240px;max-width:320px;box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:auto;cursor:pointer;animation:slideIn .25s ease;display:flex;gap:10px;align-items:flex-start;}
@keyframes slideIn{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes slideOut{from{transform:translateX(0);opacity:1;}to{transform:translateX(110%);opacity:0;}}
.toast.hiding{animation:slideOut .25s ease forwards;}
.toast-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.toast-body{flex:1;min-width:0;}
.toast-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.toast-msg{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;cursor:zoom-out;}
#lightbox.open{display:flex;}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:10px;}
*{scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">KKK <span>messaging</span></div>
    <p class="auth-subtitle">Koele Kindjes Klub Messaging</p>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Sign in</button>
      <button class="auth-tab" id="tab-signup">Create account</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label class="form-label">Email</label><input type="email" id="login-email" class="form-input" placeholder="you@example.com"/></div>
      <div class="form-group"><label class="form-label">Wachtwoord</label><input type="password" id="login-pass" class="form-input" placeholder="••••••••"/></div>
      <button class="btn-primary" id="btn-login">Sign in</button>
    </div>
    <div id="signup-form" style="display:none">
      <div class="form-group"><label class="form-label">Weergavenaam</label><input type="text" id="signup-name" class="form-input" placeholder="Jouw naam"/></div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" id="signup-email" class="form-input" placeholder="you@example.com"/></div>
      <div class="form-group"><label class="form-label">Wachtwoord</label><input type="password" id="signup-pass" class="form-input" placeholder="Min. 6 tekens"/></div>
      <button class="btn-primary" id="btn-signup">Account aanmaken</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">⚡ KKK</span>
    </div>

    <div class="sidebar-section">
      Channels
      <span class="add-btn" id="btn-new-channel" title="Nieuw kanaal">＋</span>
    </div>
    <!-- channels take flex:1 — fills all available space -->
    <div class="channel-list" id="channel-list"></div>

    <div class="sidebar-section">
      Direct messages
      <span class="add-btn" id="btn-new-dm" title="Nieuwe DM">＋</span>
    </div>
    <div class="channel-list" id="dm-list"></div>

    <div class="user-bar">
      <div class="user-avatar" id="me-avatar">?</div>
      <div class="user-bar-info">
        <div class="user-bar-name" id="me-name">—</div>
        <div class="user-bar-status">● online</div>
      </div>
      <button class="icon-btn" id="btn-signout" title="Uitloggen">→</button>
    </div>
  </div>

  <!-- Main area -->
  <div class="main" id="main">
    <div class="no-chat" id="no-chat">
      <div class="big-icon">💬</div>
      <h3>Kies een gesprek</h3>
      <p>Selecteer een kanaal of DM om te beginnen</p>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="channel-modal">
  <div class="modal">
    <h3>Nieuw kanaal</h3>
    <div class="form-group"><label class="form-label">Kanaalnaam</label><input type="text" id="new-channel-name" class="form-input" placeholder="bijv. algemeen"/></div>
    <div class="form-group"><label class="form-label">Emoji icoon</label><input type="text" id="new-channel-emoji" class="form-input" placeholder="🎮" maxlength="2"/></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel-channel">Annuleren</button>
      <button class="btn-confirm" id="btn-create-channel">Aanmaken</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="dm-modal">
  <div class="modal">
    <h3>Nieuw direct message</h3>
    <div class="form-group"><label class="form-label">E-mailadres vriend</label><input type="email" id="dm-email" class="form-input" placeholder="vriend@example.com"/></div>
    <div id="dm-user-preview" style="display:none;padding:10px;background:var(--bg3);border-radius:8px;font-size:13px;margin-top:6px;"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel-dm">Annuleren</button>
      <button class="btn-confirm" id="btn-start-dm">Start chat</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox"><img id="lightbox-img" src="" alt=""/></div>

<!-- Toast container -->
<div id="toast-container"></div>

<input type="file" id="file-input" accept="image/*" style="display:none"/>

<script type="module">
import { initializeApp }                                    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword,
         signInWithEmailAndPassword, signOut,
         onAuthStateChanged, updateProfile }                from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot,
         query, orderBy, limit, doc, setDoc, getDoc,
         getDocs, where, serverTimestamp, deleteDoc,
         updateDoc }                                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ─── PASTE YOUR FIREBASE CONFIG HERE ─────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_AUTH_DOMAIN",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
// ─────────────────────────────────────────────────────────────────────────────

// ─── IMGBB API KEY ────────────────────────────────────────────────────────────
const IMGBB_API_KEY = "YOUR_IMGBB_API_KEY";
// ─────────────────────────────────────────────────────────────────────────────

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ─── State ────────────────────────────────────────────────────────────────────
let currentUser      = null;
let currentConvo     = null;
let currentConvoType = null;
let msgUnsub         = null;
let typingUnsub      = null;
let foundDMUser      = null;
let lastDateStr      = '';
let lastSenderId     = '';
let sidebarVisible   = true;
let typingTimer      = null;
let isTyping         = false;
const unreadSet      = new Set();      // convos with unread messages
const msgCountMap    = new Map();      // uid -> message count in current convo session

// ─── Utils ────────────────────────────────────────────────────────────────────
const $   = id => document.getElementById(id);
const esc = s  => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = d  => d.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}

const AV_COLORS=['#7c6aff','#34d399','#f87171','#fbbf24','#60a5fa','#f472b6','#a3e635'];
function avatarColor(n){return AV_COLORS[(n||'?').charCodeAt(0)%AV_COLORS.length];}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function setAvatar(el,name,photoURL){
  if(photoURL){el.innerHTML=`<img src="${photoURL}" alt=""/>`;el.style.background='transparent';}
  else{el.textContent=initials(name);el.style.background=avatarColor(name);}
}

// ─── Toast notifications ──────────────────────────────────────────────────────
function showToast(title, msg, icon, onClick){
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<div class="toast-icon">${icon||'💬'}</div><div class="toast-body"><div class="toast-title">${esc(title)}</div><div class="toast-msg">${esc(msg)}</div></div>`;
  if(onClick) t.addEventListener('click', () => { onClick(); dismissToast(t); });
  $('toast-container').appendChild(t);
  setTimeout(() => dismissToast(t), 4000);
}
function dismissToast(t){
  t.classList.add('hiding');
  t.addEventListener('animationend', () => t.remove(), {once:true});
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
function showAuthError(msg){const e=$('auth-error');e.textContent=msg;e.style.display='block';}
function hideAuthError(){$('auth-error').style.display='none';}

function switchTab(tab){
  $('tab-login').classList.toggle('active',tab==='login');
  $('tab-signup').classList.toggle('active',tab==='signup');
  $('login-form').style.display  = tab==='login'  ? 'block':'none';
  $('signup-form').style.display = tab==='signup' ? 'block':'none';
  hideAuthError();
}

function friendlyError(code){
  return({'auth/invalid-email':'Ongeldig e-mailadres.','auth/user-not-found':'Geen account met dit e-mailadres.','auth/wrong-password':'Verkeerd wachtwoord.','auth/email-already-in-use':'E-mailadres al in gebruik.','auth/weak-password':'Wachtwoord minimaal 6 tekens.','auth/invalid-credential':'Verkeerd e-mailadres of wachtwoord.'})[code]||'Er ging iets mis. Probeer opnieuw.';
}

async function doLogin(){
  hideAuthError();
  try{ await signInWithEmailAndPassword(auth,$('login-email').value.trim(),$('login-pass').value); }
  catch(e){ showAuthError(friendlyError(e.code)); }
}

async function doSignup(){
  hideAuthError();
  const name=$('signup-name').value.trim(), email=$('signup-email').value.trim(), pass=$('signup-pass').value;
  if(!name) return showAuthError('Voer een weergavenaam in.');
  try{
    const cred = await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(cred.user,{displayName:name});
    await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,displayName:name,email,createdAt:serverTimestamp(),online:true});
  }catch(e){ showAuthError(friendlyError(e.code)); }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if(user){
    currentUser = user;
    $('auth-screen').style.display='none';
    $('app').classList.add('visible');
    $('me-name').textContent = user.displayName||user.email;
    setAvatar($('me-avatar'),user.displayName,user.photoURL);
    loadChannels();
    loadDMs();
  } else {
    currentUser=null;
    $('auth-screen').style.display='flex';
    $('app').classList.remove('visible');
  }
});

// ─── Sidebar toggle ───────────────────────────────────────────────────────────
function toggleSidebar(){
  sidebarVisible = !sidebarVisible;
  $('sidebar').classList.toggle('collapsed', !sidebarVisible);
  const btn = $('btn-toggle-sidebar');
  if(btn) btn.textContent = sidebarVisible ? '◀' : '▶';
}

// ─── Channels ─────────────────────────────────────────────────────────────────
function loadChannels(){
  onSnapshot(query(collection(db,'channels'),orderBy('createdAt','asc')), snap => {
    const list=$('channel-list');
    list.innerHTML='';
    snap.forEach(d => list.appendChild(buildChannelItem(d.id,d.data())));
  });
}

function buildChannelItem(id,data){
  const el=document.createElement('div');
  el.className='channel-item'+(currentConvo===id?' active':'')+(unreadSet.has(id)?' has-unread':'');
  el.dataset.id=id;
  el.innerHTML=`<div class="channel-icon">${data.emoji||'#'}</div><span class="channel-name">${esc(data.name)}</span><span class="unread-dot"></span>`;
  el.onclick=()=>openChannel(id,data);
  return el;
}

function openChannel(id,data){
  setActiveItem(id);
  currentConvo=id; currentConvoType='channel';
  unreadSet.delete(id);
  msgCountMap.clear();
  buildChatUI(`${data.emoji||'#'} ${data.name}`,'Groepskanaal',data.emoji||'#');
  loadMessages('channels',id);
  stopTypingListener();
  listenTyping('channels',id);
}

async function createChannel(){
  const name=$('new-channel-name').value.trim();
  const emoji=$('new-channel-emoji').value.trim()||'#';
  if(!name){alert('Geef een kanaalnaam op.');return;}
  const btn=$('btn-create-channel');
  btn.disabled=true; btn.textContent='Aanmaken…';
  try{
    await addDoc(collection(db,'channels'),{name,emoji,createdBy:currentUser.uid,createdAt:serverTimestamp()});
    closeModals();
    $('new-channel-name').value='';
    $('new-channel-emoji').value='';
  }catch(e){
    console.error('createChannel:',e);
    alert('Kanaal aanmaken mislukt: '+e.message+'\n\nControleer je Firestore rules en Firebase config.');
  }finally{
    btn.disabled=false; btn.textContent='Aanmaken';
  }
}

// ─── DMs ──────────────────────────────────────────────────────────────────────
function loadDMs(){
  onSnapshot(query(collection(db,'dms'),where('members','array-contains',currentUser.uid)), snap => {
    const list=$('dm-list');
    list.innerHTML='';
    snap.forEach(d=>list.appendChild(buildDMItem(d.id,d.data())));
  });
}

function buildDMItem(id,data){
  const otherUid=data.members.find(m=>m!==currentUser.uid);
  const otherName=data.names?.[otherUid]||'Onbekend';
  const el=document.createElement('div');
  el.className='channel-item'+(currentConvo===id?' active':'')+(unreadSet.has(id)?' has-unread':'');
  el.dataset.id=id;
  const av=document.createElement('div');
  av.className='user-avatar';
  av.style.cssText='width:28px;height:28px;border-radius:8px;flex-shrink:0';
  setAvatar(av,otherName,data.photos?.[otherUid]||null);
  const nameSpan=document.createElement('span');
  nameSpan.className='channel-name'; nameSpan.textContent=otherName;
  const dot=document.createElement('span');
  dot.className='dm-status online';
  const unread=document.createElement('span');
  unread.className='unread-dot';
  el.append(av,nameSpan,dot,unread);
  el.onclick=()=>openDM(id,data,otherName,otherUid);
  return el;
}

async function lookupDMUser(){
  const email=$('dm-email').value.trim().toLowerCase();
  const preview=$('dm-user-preview');
  if(!email.includes('@')){preview.style.display='none';foundDMUser=null;return;}
  preview.textContent='Zoeken…'; preview.style.color='var(--text2)'; preview.style.display='block';
  try{
    const snap=await getDocs(query(collection(db,'users'),where('email','==',email)));
    if(snap.empty){
      foundDMUser=null;
      preview.textContent='Geen gebruiker gevonden. Heeft diegene al een account aangemaakt?';
      preview.style.color='var(--red)';
    } else {
      foundDMUser={uid:snap.docs[0].id,...snap.docs[0].data()};
      preview.innerHTML=`Gevonden: <strong style="color:var(--text)">${esc(foundDMUser.displayName)}</strong>`;
      preview.style.color='var(--green)';
    }
  }catch(e){
    console.error('lookupDMUser:',e);
    preview.textContent='Zoekfout: '+e.message;
    preview.style.color='var(--red)';
    foundDMUser=null;
  }
}

async function startDM(){
  if(!foundDMUser) await lookupDMUser();
  if(!foundDMUser){alert('Geen gebruiker gevonden. Controleer het e-mailadres.');return;}
  if(foundDMUser.uid===currentUser.uid){alert('Je kunt jezelf geen DM sturen!');return;}
  const btn=$('btn-start-dm');
  btn.disabled=true; btn.textContent='Starten…';
  try{
    const members=[currentUser.uid,foundDMUser.uid].sort();
    const dmId=members.join('_');
    const ref=doc(db,'dms',dmId);
    if(!(await getDoc(ref)).exists()){
      await setDoc(ref,{members,names:{[currentUser.uid]:currentUser.displayName,[foundDMUser.uid]:foundDMUser.displayName},createdAt:serverTimestamp()});
    }
    closeModals();
    openDM(dmId,{members,names:{[currentUser.uid]:currentUser.displayName,[foundDMUser.uid]:foundDMUser.displayName}},foundDMUser.displayName,foundDMUser.uid);
  }catch(e){
    console.error('startDM:',e);
    alert('DM starten mislukt: '+e.message);
  }finally{
    btn.disabled=false; btn.textContent='Start chat';
  }
}

function openDM(id,data,otherName,otherUid){
  setActiveItem(id); currentConvo=id; currentConvoType='dm';
  unreadSet.delete(id);
  msgCountMap.clear();
  buildChatUI(otherName,'Direct message','💬');
  loadMessages('dms',id);
  stopTypingListener();
  listenTyping('dms',id);
}

// ─── Chat UI ──────────────────────────────────────────────────────────────────
function buildChatUI(name,meta,icon){
  $('main').innerHTML=`
    <div class="chat-header">
      <button class="icon-btn" id="btn-toggle-sidebar" title="Sidebar in-/uitklappen">${sidebarVisible?'◀':'▶'}</button>
      <div class="chat-header-icon">${icon}</div>
      <div class="chat-header-info">
        <div class="chat-header-name">${esc(name)}</div>
        <div class="chat-header-meta">${meta}</div>
      </div>
    </div>
    <div class="messages-container" id="messages"></div>
    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dots" id="typing-dots"><span></span><span></span><span></span></div>
      <span id="typing-text"></span>
    </div>
    <div class="input-area">
      <div class="upload-bar" id="upload-bar"><div class="upload-fill" id="upload-fill"></div></div>
      <div class="input-box">
        <textarea id="msg-input" rows="1" placeholder="Stuur een bericht…"></textarea>
        <div class="input-actions">
          <button class="attach-btn" id="attach-btn" title="Afbeelding">📎</button>
          <button class="send-btn" id="send-btn">↑</button>
        </div>
      </div>
    </div>
  `;
  $('btn-toggle-sidebar').addEventListener('click', toggleSidebar);
  $('msg-input').addEventListener('keydown', e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
  $('msg-input').addEventListener('input', e=>{ autoResize(e.target); handleTypingInput(); });
  $('send-btn').addEventListener('click', sendMessage);
  $('attach-btn').addEventListener('click', ()=>$('file-input').click());
}

function setActiveItem(id){
  document.querySelectorAll('.channel-item').forEach(el=>{
    el.classList.remove('active');
    if(el.dataset.id===id) el.classList.add('active');
  });
  $('no-chat')?.remove();
}

// ─── Messages ─────────────────────────────────────────────────────────────────
function loadMessages(col,id){
  if(msgUnsub) msgUnsub();
  let firstLoad=true;
  msgUnsub=onSnapshot(
    query(collection(db,col,id,'messages'),orderBy('createdAt','asc'),limit(100)),
    snap=>{
      if(firstLoad){
        // On first load just render — these are existing messages, no notifications
        firstLoad=false;
        renderMessages(snap.docs);
      } else {
        snap.docChanges().forEach(change=>{
          if(change.type!=='added') return;
          const data=change.doc.data();

          // Append to chat if it's currently open
          const c=$('messages');
          if(c){ appendMessage(data,c); c.scrollTop=c.scrollHeight; }

          // Only notify for other people's messages
          if(data.uid===currentUser.uid) return;

          const chatIsActive = (currentConvo===id) && !document.hidden;

          // Always mark unread + show in-app toast when not actively looking
          if(!chatIsActive){
            unreadSet.add(id);
            refreshSidebarUnread(id);
            const preview = data.text || '📷 Afbeelding';
            showToast(data.displayName||'Nieuw bericht', preview, '💬', ()=>{
              const el=document.querySelector(`.channel-item[data-id="${id}"]`);
              if(el) el.click();
            });
          }

          // Browser/OS notification — fires whenever tab is hidden OR window not focused
          const windowFocused = document.hasFocus();
          if(!windowFocused || document.hidden){
            if(Notification.permission==='granted'){
              const n = new Notification((data.displayName||'KKK Messaging') + ' • KKK', {
                body: data.text || 'Stuurde een afbeelding',
                icon: 'https://em-content.zobj.net/source/twitter/376/speech-balloon_1f4ac.png',
                tag: id,        // group notifications per conversation
                renotify: true, // always sound even if same tag
                requireInteraction: false,
              });
              n.onclick = () => {
                window.focus();
                const el=document.querySelector(`.channel-item[data-id="${id}"]`);
                if(el) el.click();
                n.close();
              };
            } else if(Notification.permission==='default'){
              // Permission not yet decided — request it now
              Notification.requestPermission();
            }
          }
        });
      }
    }
  );
}

function renderMessages(docs){
  const c=$('messages'); if(!c) return;
  c.innerHTML=''; lastDateStr=''; lastSenderId='';
  docs.forEach(d=>appendMessage(d.data(),c));
  c.scrollTop=c.scrollHeight;
}

function appendMessage(data,container){
  if(!container){container=$('messages');if(!container)return;}
  const ts=data.createdAt?.toDate?.()||new Date();
  const dateStr=ts.toDateString();
  if(dateStr!==lastDateStr){
    const sep=document.createElement('div');
    sep.className='date-sep';
    sep.textContent=ts.toLocaleDateString('nl-NL',{weekday:'long',month:'long',day:'numeric'});
    container.appendChild(sep);
    lastDateStr=dateStr; lastSenderId='';
  }
  const isOwn=data.uid===currentUser.uid;
  const showHeader=data.uid!==lastSenderId;
  lastSenderId=data.uid;
  const row=document.createElement('div');
  row.className='msg-row'+(isOwn?' own':'');
  const av=document.createElement('div');
  av.className=showHeader?'msg-avatar':'msg-avatar placeholder';
  if(showHeader) setAvatar(av,data.displayName,data.photoURL||null);
  const content=document.createElement('div');
  content.className='msg-content';
  if(showHeader){
    // update message count for this sender
    const uid = data.uid||'unknown';
    const prevCount = msgCountMap.get(uid)||0;
    msgCountMap.set(uid, prevCount+1);
    const count = msgCountMap.get(uid);
    const isOwn2 = data.uid===currentUser.uid;
    const countBadge = (!isOwn2 && count>1)
      ? `<span class="msg-count">${count} berichten</span>`
      : '';
    const h=document.createElement('div');
    h.className='msg-header';
    h.innerHTML=`<span class="msg-name">${esc(data.displayName||'Onbekend')}</span>${countBadge}<span class="msg-time">${fmt(ts)}</span>`;
    content.appendChild(h);
  }
  if(data.imageURL){
    const img=document.createElement('img');
    img.className='msg-image'; img.src=data.imageURL;
    img.onclick=()=>{$('lightbox-img').src=data.imageURL;$('lightbox').classList.add('open');};
    content.appendChild(img);
  } else {
    const bubble=document.createElement('div');
    bubble.className='msg-bubble'; bubble.textContent=data.text;
    content.appendChild(bubble);
  }
  row.append(av,content);
  container.appendChild(row);
}

function refreshSidebarUnread(id){
  const el=document.querySelector(`.channel-item[data-id="${id}"]`);
  if(el) el.classList.toggle('has-unread', unreadSet.has(id));
}

async function sendMessage(){
  const input=$('msg-input'); if(!input) return;
  const text=input.value.trim();
  if(!text||!currentConvo) return;
  input.value=''; autoResize(input);
  clearTypingStatus();
  const col=currentConvoType==='channel'?'channels':'dms';
  await addDoc(collection(db,col,currentConvo,'messages'),{
    text, uid:currentUser.uid,
    displayName:currentUser.displayName||currentUser.email,
    photoURL:currentUser.photoURL||null,
    createdAt:serverTimestamp()
  });
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

// ─── Typing indicator ─────────────────────────────────────────────────────────
function typingDocRef(){
  if(!currentConvo) return null;
  const col=currentConvoType==='channel'?'channels':'dms';
  return doc(db,col,currentConvo,'typing',currentUser.uid);
}

async function setTypingStatus(typing){
  const ref=typingDocRef(); if(!ref) return;
  try{
    if(typing){
      await setDoc(ref,{uid:currentUser.uid,name:currentUser.displayName||currentUser.email,at:serverTimestamp()},{merge:true});
    } else {
      await deleteDoc(ref);
    }
  }catch(e){ /* typing is non-critical */ }
}

function handleTypingInput(){
  if(!isTyping){ isTyping=true; setTypingStatus(true); }
  clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>{ isTyping=false; setTypingStatus(false); }, 2500);
}

function clearTypingStatus(){
  clearTimeout(typingTimer); isTyping=false; setTypingStatus(false);
}

function listenTyping(col,id){
  typingUnsub=onSnapshot(collection(db,col,id,'typing'), snap=>{
    const others=snap.docs
      .filter(d=>d.id!==currentUser.uid)
      .map(d=>d.data().name||'Iemand');
    const dots=$('typing-dots');
    const text=$('typing-text');
    if(!dots||!text) return;
    if(others.length===0){
      dots.classList.remove('visible');
      text.textContent='';
    } else {
      dots.classList.add('visible');
      text.textContent = others.length===1
        ? `${others[0]} is aan het typen…`
        : `${others.join(', ')} zijn aan het typen…`;
    }
  });
}

function stopTypingListener(){
  if(typingUnsub){ typingUnsub(); typingUnsub=null; }
  const dots=$('typing-dots'); const text=$('typing-text');
  if(dots) dots.classList.remove('visible');
  if(text) text.textContent='';
}

// ─── ImgBB upload ─────────────────────────────────────────────────────────────
async function handleFileSelect(e){
  const file=e.target.files[0];
  if(!file||!currentConvo) return;
  e.target.value='';
  if(!IMGBB_API_KEY||IMGBB_API_KEY==='YOUR_IMGBB_API_KEY'){
    alert('Voeg eerst je ImgBB API key toe!'); return;
  }
  const bar=$('upload-bar'),fill=$('upload-fill'),btn=$('attach-btn');
  bar?.classList.add('active'); if(fill) fill.style.width='15%'; if(btn) btn.disabled=true;
  try{
    const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});
    if(fill) fill.style.width='40%';
    const fd=new FormData();
    fd.append('key',IMGBB_API_KEY);
    fd.append('image',base64.split(',')[1]);
    const res=await fetch('https://api.imgbb.com/1/upload',{method:'POST',body:fd});
    const json=await res.json();
    if(fill) fill.style.width='85%';
    if(!json.success) throw new Error(json.error?.message||'Upload mislukt');
    clearTypingStatus();
    const col=currentConvoType==='channel'?'channels':'dms';
    await addDoc(collection(db,col,currentConvo,'messages'),{
      imageURL:json.data.url, uid:currentUser.uid,
      displayName:currentUser.displayName||currentUser.email,
      photoURL:currentUser.photoURL||null,
      createdAt:serverTimestamp()
    });
    if(fill) fill.style.width='100%';
  }catch(err){
    console.error(err); alert('Upload mislukt: '+err.message);
  }finally{
    setTimeout(()=>{bar?.classList.remove('active');if(fill)fill.style.width='0%';if(btn)btn.disabled=false;},600);
  }
}

// ─── Browser notification permission ─────────────────────────────────────────
function requestNotifPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default'){
    Notification.requestPermission().then(p=>{
      console.log('Notification permission:', p);
    });
  }
}

function closeModals(){ document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open')); }

$('tab-login').addEventListener('click',  ()=>switchTab('login'));
$('tab-signup').addEventListener('click', ()=>switchTab('signup'));
$('btn-login').addEventListener('click',  doLogin);
$('btn-signup').addEventListener('click', doSignup);
$('login-pass').addEventListener('keydown',  e=>{if(e.key==='Enter') doLogin();});
$('signup-pass').addEventListener('keydown', e=>{if(e.key==='Enter') doSignup();});

$('btn-signout').addEventListener('click', ()=>{ clearTypingStatus(); signOut(auth); });

$('btn-new-channel').addEventListener('click', ()=>{

// Request notification permission immediately
requestNotifPermission();
</script>
